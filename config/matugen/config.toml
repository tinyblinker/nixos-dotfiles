# matugen config: extract colors from wallpaper, render app color files to ./matugen/output/
# Run: ./matugen/generate.sh
[config]

[templates.waybar]
input_path = './templates/waybar.css'
output_path = './output/waybar.css'

[templates.fuzzel]
input_path = './templates/fuzzel.ini'
output_path = './output/fuzzel.ini'

[templates.hyprlock]
input_path = './templates/hyprlock.conf'
output_path = './output/hyprlock.conf'

[templates.swaync]
input_path = './templates/swaync.css'
output_path = './output/swaync.css'

[templates.swayosd]
input_path = './templates/swayosd.css'
output_path = './output/swayosd.css'

[templates.kitty]
input_path = './templates/kitty.conf'
output_path = './output/kitty.conf'

[templates.gtk3]
input_path = './templates/gtk-colors.css'
output_path = './output/gtk3-colors.css'

[templates.gtk4]
input_path = './templates/gtk-colors.css'
output_path = './output/gtk4-colors.css'

[templates.qt6ct]
input_path = './templates/qt-colors.conf'
output_path = './output/qt-colors.conf'
